<!DOCTYPE html>
<html>
<head>
  <title>Contact Us</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: linear-gradient(135deg, #1e2a78, #00c6ff);
      color: white;
    }

    form {
      margin-top: 50px;
    }

    input, textarea {
      padding: 10px;
      margin: 10px;
      width: 250px;
      border-radius: 5px;
      border: none;
    }

    button {
      padding: 10px 20px;
      background: blue;
      color: white;
      border: none;
      border-radius: 5px;
    }
  </style>
</head>

<body>

  <h1>Contact Us</h1>

  <form id="contactForm">
    <input type="text" id="name" placeholder="Your Name" required><br>
    <input type="email" id="email" placeholder="Your Email" required><br>
    <textarea id="message" placeholder="Your Message" required></textarea><br>

    <button type="submit">Send</button>
  </form>

  <p id="status" style="min-height: 1.2em;"></p>

  <script>
    document.getElementById("contactForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const nameEl = document.getElementById("name");
      const emailEl = document.getElementById("email");
      const messageEl = document.getElementById("message");
      const statusEl = document.getElementById("status");

      statusEl.textContent = "Sending...";
      statusEl.style.color = "white";

      try {
        const apiBase = window.location.protocol === "file:" ? "http://localhost:3000" : "";
        const resp = await fetch(`${apiBase}/contact`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            name: nameEl.value,
            email: emailEl.value,
            message: messageEl.value
          })
        });

        if (!resp.ok) {
          const contentType = resp.headers.get("content-type") || "";
          if (contentType.includes("application/json")) {
            const data = await resp.json();
            throw new Error(data?.message || "Request failed");
          }

          const text = await resp.text();
          throw new Error(text || "Request failed");
        }

        const contentType = resp.headers.get("content-type") || "";
        let serverMessage = "Message Sent!";

        if (contentType.includes("application/json")) {
          const data = await resp.json();
          serverMessage = data?.message || serverMessage;
        } else {
          const text = await resp.text();
          serverMessage = text || serverMessage;
        }

        nameEl.value = "";
        emailEl.value = "";
        messageEl.value = "";
        statusEl.textContent = serverMessage;
        statusEl.style.color = "#c8ffdf";
      } catch (err) {
        statusEl.textContent = err?.message || "Failed to send. Is the server running?";
        statusEl.style.color = "#ffd1d1";
        console.error(err);
      }
    });
  </script>

</body>
</html>
